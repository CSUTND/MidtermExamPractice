<!DOCTYPE html>
<html>
	<head>
        <title> Explore </title>

		<link rel="stylesheet" href="./css/styles.css">

        <!--bootstrap -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

        <!--jquery -->
        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
        <link rel="stylesheet" href="css/jquery-ui.min.css">
        <link rel="stylesheet" href="css/jquery-ui.theme.min.css">
        <link rel="stylesheet" href="css/jquery-ui.structure.min.css">
	</head>

    <!--navigation bar-->
    <nav class="navbar navbar-expand-sm bg-dark navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Planets in the Solar System</a>

        <form class="d-flex">
                <button class="btn btn-primary" type="button">Explore</button>
                <button class="btn text-white" type="button">About</button>
        </form>
        </div>
    </nav>

    <!--hide the details upon initalizing and get planet data from an api-->
    <script>
    $(function () { $("#dialog").hide(); });
    </script>

    <!--main page-->
	<body>
		<div class="wrapper">
			<div class="header">
				<p>Click on the cards to learn more about each celestial body.</p>
			</div>

            <!--fill the body with planets to select-->
            <div class="entry" id="mercury">
                <figure>
                    <img src="images/mercury.png" alt="mercury" />
                </figure>
            </div>
            
            <!--the details-->
			<div id="dialog" title="Properties">
				<p><strong>Name: </strong><span class="name">name</span></p>
				<p><strong>Constellation: </strong><span class="constellation">constellation</span></p>
				<p><strong>Altitude: </strong><span class="altitude">altitude</span></p>
				<p><strong>Azimuth: </strong><span class="azimuth">azimuth</span></p>
			</div>
			
		</div>
	</body>

</html>
